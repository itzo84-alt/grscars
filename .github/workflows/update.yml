name: Aggiorna Annunci GRS Cars

"on":
schedule:
  - cron: '0 */2 * * *'
workflow_dispatch:

jobs:
scrape:
  runs-on: ubuntu-latest
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Installa librerie
      run: pip install requests
    - name: Esegui scraper
      run: python scripts/scraper.py
    - name: Salva aggiornamenti
      run: |
        git config user.name "GRS Cars Bot"
        git config user.email "bot@grscars.it"
        git add data/cars.json
        git diff --staged --quiet || git commit -m "Aggiornamento annunci"
        git push